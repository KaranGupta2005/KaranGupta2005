name: Generate GitHub Stats SVG

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Generate stats SVG
        uses: cicirello/user-statistician@v2
        with:
          image-file: generated/stats.svg
          locale: en
          color-scheme: dark
          custom-title: "GitHub Stats"
          include-title: true
          featured-repository: ""
          animated-image: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add generated/stats.svg
          git diff --staged --quiet || git commit -m "chore: update stats SVG [skip ci]"
          git push
