name: Generate GitHub Stats SVGs

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate stats images
        uses: jstrieb/github-stats@master
        env:
          ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXCLUDED: ""
          EXCLUDE_FORKED_REPOS: true
        continue-on-error: true

      - name: Move generated files
        run: |
          mkdir -p generated
          mv github-stats-output/overview.svg generated/overview.svg 2>/dev/null || true
          mv github-stats-output/languages.svg generated/languages.svg 2>/dev/null || true
        continue-on-error: true

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add generated/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update stats SVGs [skip ci]"
          git push || true
